name: Refresh bookings cache

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh cached bookings
        env:
          BOOKINGS_REFRESH_URL: ${{ secrets.BOOKINGS_REFRESH_URL }}
        run: |
          if [ -z "$BOOKINGS_REFRESH_URL" ]; then
            echo "BOOKINGS_REFRESH_URL secret is missing"
            exit 1
          fi

          curl -fsS --retry 3 --retry-delay 5 "$BOOKINGS_REFRESH_URL"
